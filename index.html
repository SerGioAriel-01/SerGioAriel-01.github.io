<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adopción de Mascotas - Huellitas Felices</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="stilo.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success justify-content-center">
    <div class="container">
      <a class="navbar-brand" href="#">
        <img src="./img/navimg.png" alt="Logo de Huellitas Felices" class="navbar-logo">
        Bienvenidos a Huellitas Felices
      </a>
    </div>
  </nav>
  <div class="container mt-4">
    <h1>Animalitos que buscan un hogar</h1>
    <div id="animal-list"></div>

    <div class="comments-section mt-4">
      <h2>Deja tu comentario</h2>
      <form id="comment-form">
        <div class="mb-3">
          <label for="name-input" class="form-label">Tu nombre:</label>
          <input type="text" id="name-input" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="comment-input" class="form-label">Comentario:</label>
          <textarea id="comment-input" class="form-control" placeholder="Escribe aquí tu comentario" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar comentario</button>
      </form>
      <div id="comments" class="mt-4">
        <!-- Aquí mostrare los comentarios -->
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
